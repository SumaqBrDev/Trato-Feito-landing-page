<svg viewBox="0 0 460 72" xmlns="http://www.w3.org/2000/svg" style="height:44px;width:auto;display:block;background:transparent;">
  <title>Trato Feito Pomerode</title>
  <desc>Logo horizontal estilo tech da loja Trato Feito Pomerode</desc>

  <rect width="460" height="72" fill="transparent"/>

  <!-- ÍCONE: plugue/conector estilizado -->
  <rect x="8" y="18" width="28" height="36" rx="5" ry="5"
        fill="none" stroke="#ffffff" stroke-width="1.8"/>
  <line x1="17" y1="12" x2="17" y2="22" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
  <line x1="27" y1="12" x2="27" y2="22" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
  <circle cx="22" cy="36" r="3.5" fill="none" stroke="#cc1111" stroke-width="1.5"/>
  <circle cx="22" cy="36" r="1.5" fill="#cc1111"/>
  <line x1="22" y1="54" x2="22" y2="62" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="14" y1="62" x2="30" y2="62" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round"/>

  <!-- TRATO -->
  <text x="52" y="42"
        font-family="'Arial Narrow', Arial, sans-serif"
        font-size="42" font-weight="700"
        fill="#ffffff" letter-spacing="3">TRATO</text>

  <!-- FEITO -->
  <text x="54" y="62"
        font-family="'Arial Narrow', Arial, sans-serif"
        font-size="19" font-weight="300"
        fill="#aabbbb" letter-spacing="10">FEITO</text>

  <!-- Linha vermelha sob FEITO -->
  <rect x="52" y="65" width="182" height="2" rx="1" fill="#cc1111"/>

  <!-- Ponto vermelho no i de FEITO -->
  <circle cx="163" cy="53" r="2.5" fill="#cc1111"/>

  <!-- Separador vertical -->
  <line x1="250" y1="14" x2="250" y2="58" stroke="#3a4a4a" stroke-width="1"/>

  <!-- Label ELETRÔNICOS -->
  <text x="355" y="26"
        font-family="'Arial Narrow', Arial, sans-serif"
        font-size="11" font-weight="300"
        fill="#556677" text-anchor="middle" letter-spacing="4">ELETRÔNICOS</text>

  <!-- Caixa contorno vermelho POMERODE -->
  <rect x="264" y="34" width="182" height="22" rx="2" ry="2"
        fill="none" stroke="#cc1111" stroke-width="1.2"/>
  <text x="355" y="50"
        font-family="'Arial Narrow', Arial, sans-serif"
        font-size="14" font-weight="600"
        fill="#ddeeff" text-anchor="middle" letter-spacing="5">POMERODE</text>

  <!-- Tagline -->
  <text x="355" y="68"
        font-family="'Arial Narrow', Arial, sans-serif"
        font-size="9" font-weight="300"
        fill="#445566" text-anchor="middle" letter-spacing="3">NOVOS · SEMINOVOS</text>
</svg>
