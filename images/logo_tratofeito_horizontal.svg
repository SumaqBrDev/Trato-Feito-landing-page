<svg viewBox="0 0 620 120" xmlns="http://www.w3.org/2000/svg" style="background:#111;">
  <title>Trato Feito Pomerode — Logo Horizontal</title>

  <defs>
    <radialGradient id="badge-bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#3a3a3a"/>
      <stop offset="60%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <linearGradient id="ring-metal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#888"/>
      <stop offset="25%"  stop-color="#ddd"/>
      <stop offset="50%"  stop-color="#aaa"/>
      <stop offset="75%"  stop-color="#fff"/>
      <stop offset="100%" stop-color="#777"/>
    </linearGradient>
    <linearGradient id="text-metal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="30%"  stop-color="#e0e0e0"/>
      <stop offset="50%"  stop-color="#aaaaaa"/>
      <stop offset="70%"  stop-color="#dddddd"/>
      <stop offset="100%" stop-color="#888888"/>
    </linearGradient>
    <linearGradient id="red-script" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ff4444"/>
      <stop offset="50%"  stop-color="#cc1111"/>
      <stop offset="100%" stop-color="#991100"/>
    </linearGradient>
    <filter id="badge-shadow">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.7"/>
    </filter>
    <filter id="text-shadow">
      <feDropShadow dx="1" dy="1" stdDeviation="1.5" flood-color="#000" flood-opacity="0.8"/>
    </filter>
  </defs>

  <!-- BADGE CIRCULAR -->
  <circle cx="62" cy="62" r="53" fill="#000" opacity="0.5" filter="url(#badge-shadow)"/>
  <g transform="translate(60,60)">
    <g fill="url(#ring-metal)" opacity="0.9">
      <polygon points="0,-56 -4,-48 4,-48"/>
      <polygon points="0,-56 -4,-48 4,-48" transform="rotate(20)"/>
      <polygon points="0,-56 -4,-48 4,-48" transform="rotate(40)"/>
      <polygon points="0,-56 -4,-48 4,-48" transform="rotate(60)"/>
      <polygon points="0,-56 -4,-48 4,-48" transform="rotate(80)"/>
      <polygon points="0,-56 -4,-48 4,-48" transform="rotate(100)"/>
      <polygon points="0,-56 -4,-48 4,-48" transform="rotate(120)"/>
      <polygon points="0,-56 -4,-48 4,-48" transform="rotate(140)"/>
      <polygon points="0,-56 -4,-48 4,-48" transform="rotate(160)"/>
      <polygon points="0,-56 -4,-48 4,-48" transform="rotate(180)"/>
      <polygon points="0,-56 -4,-48 4,-48" transform="rotate(200)"/>
      <polygon points="0,-56 -4,-48 4,-48" transform="rotate(220)"/>
      <polygon points="0,-56 -4,-48 4,-48" transform="rotate(240)"/>
      <polygon points="0,-56 -4,-48 4,-48" transform="rotate(260)"/>
      <polygon points="0,-56 -4,-48 4,-48" transform="rotate(280)"/>
      <polygon points="0,-56 -4,-48 4,-48" transform="rotate(300)"/>
      <polygon points="0,-56 -4,-48 4,-48" transform="rotate(320)"/>
      <polygon points="0,-56 -4,-48 4,-48" transform="rotate(340)"/>
    </g>
  </g>
  <circle cx="60" cy="60" r="54" fill="none" stroke="url(#ring-metal)" stroke-width="4"/>
  <circle cx="60" cy="60" r="49" fill="none" stroke="url(#ring-metal)" stroke-width="1.5" opacity="0.6"/>
  <circle cx="60" cy="60" r="46" fill="none" stroke="#555" stroke-width="0.5"/>
  <circle cx="60" cy="60" r="48" fill="url(#badge-bg)"/>
  <line x1="14" y1="60" x2="106" y2="60" stroke="#444" stroke-width="0.5"/>
  <text x="60" y="53" font-family="Georgia, serif" font-size="19" font-weight="900" text-anchor="middle" fill="url(#text-metal)" filter="url(#text-shadow)" letter-spacing="3">TRATO</text>
  <text x="60" y="72" font-family="Georgia, serif" font-size="15" font-style="italic" font-weight="700" text-anchor="middle" fill="url(#red-script)" filter="url(#text-shadow)" letter-spacing="1">Feito</text>
  <line x1="22" y1="76" x2="98" y2="76" stroke="#cc1111" stroke-width="1" opacity="0.8"/>
  <line x1="28" y1="78" x2="92" y2="78" stroke="#cc1111" stroke-width="0.4" opacity="0.4"/>

  <!-- TEXTO HORIZONTAL -->
  <line x1="128" y1="20" x2="128" y2="100" stroke="url(#ring-metal)" stroke-width="1.5" opacity="0.6"/>
  <text x="148" y="56" font-family="Georgia, serif" font-size="42" font-weight="900" fill="url(#text-metal)" filter="url(#text-shadow)" letter-spacing="5">TRATO</text>
  <text x="150" y="95" font-family="Georgia, serif" font-size="34" font-style="italic" font-weight="700" fill="url(#red-script)" filter="url(#text-shadow)" letter-spacing="2">Feito</text>
  <line x1="148" y1="100" x2="342" y2="100" stroke="#cc1111" stroke-width="1.5" opacity="0.7"/>
  <line x1="148" y1="103" x2="342" y2="103" stroke="#cc1111" stroke-width="0.5" opacity="0.3"/>

  <!-- SEPARADOR + POMERODE -->
  <line x1="355" y1="25" x2="355" y2="95" stroke="#444" stroke-width="1" opacity="0.7"/>
  <rect x="351" y="55" width="8" height="8" fill="url(#ring-metal)" transform="rotate(45 355 59)" opacity="0.8"/>
  <line x1="372" y1="42" x2="600" y2="42" stroke="#444" stroke-width="0.5" opacity="0.5"/>
  <text x="486" y="38" font-family="Georgia, serif" font-size="9" font-weight="400" text-anchor="middle" fill="#888" letter-spacing="4">ELETRÔNICOS</text>
  <text x="486" y="75" font-family="Georgia, serif" font-size="26" font-style="italic" font-weight="700" text-anchor="middle" fill="url(#red-script)" filter="url(#text-shadow)" letter-spacing="1">Pomerode</text>
  <line x1="372" y1="82" x2="600" y2="82" stroke="#444" stroke-width="0.5" opacity="0.5"/>
  <text x="486" y="95" font-family="Georgia, serif" font-size="8" font-weight="400" text-anchor="middle" fill="#666" letter-spacing="5">NOVOS · SEMINOVOS</text>
  <text x="372" y="76" font-size="10" fill="#cc1111" opacity="0.7" font-family="serif">✦</text>
  <text x="592" y="76" font-size="10" fill="#cc1111" opacity="0.7" font-family="serif">✦</text>

</svg>
